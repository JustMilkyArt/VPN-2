##############################################################
# Nginx default-drop config — блокировка прямого доступа по IP
# Place at: /etc/nginx/sites-available/vpn-admin
# Enable: ln -sf /etc/nginx/sites-available/vpn-admin /etc/nginx/sites-enabled/vpn-admin
#
# После настройки домена (поддомен admin-panel) Nginx обслуживает
# сайт только через HTTPS по домену (admin.example.com).
# Все запросы по IP на портах 80 и 443 — сбрасываются (444).
#
# Требует: пакет ssl-cert (apt install ssl-cert)
#   apt-get install -y ssl-cert
##############################################################

# Block direct IP access on port 80
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

# Block direct IP access on port 443
server {
    listen 443 default_server ssl;
    listen [::]:443 default_server ssl;
    server_name _;

    # Self-signed certificate to satisfy nginx on port 443
    # (package ssl-cert provides these files)
    ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;

    return 444;
}
