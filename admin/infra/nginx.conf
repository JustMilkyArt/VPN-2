##############################################################
# Nginx config for VPN Admin Panel
# Place at: /etc/nginx/sites-available/vpn-admin
# Enable: ln -sf /etc/nginx/sites-available/vpn-admin /etc/nginx/sites-enabled/vpn-admin
##############################################################

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy no-referrer;

    # Static frontend files (web_admin)
    root /opt/vpn-admin/frontend/web_admin;
    index index.html;

    # Frontend SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        # Large body for SSH key uploads
        client_max_body_size 1m;
    }

    # /docs — защищён HTTP Basic Auth (те же логин/пароль что в админке)
    # .htpasswd генерируется автоматически из .env при каждом рестарте backend
    location /docs {
        auth_basic "VPN Admin API Docs";
        auth_basic_user_file /etc/nginx/docs.htpasswd;
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        auth_basic "VPN Admin API Docs";
        auth_basic_user_file /etc/nginx/docs.htpasswd;
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_set_header Host $host;
    }
    location /redoc {
        auth_basic "VPN Admin API Docs";
        auth_basic_user_file /etc/nginx/docs.htpasswd;
        proxy_pass http://127.0.0.1:8000/redoc;
        proxy_set_header Host $host;
    }
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    # Static assets cache
    location ~* \.(js|css|png|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
